<!-- start custom head snippets, customize with your own _includes/head-custom.html file -->

<!-- Font override: easy to remove -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Source+Sans+3:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
  body {
    font-family: "Merriweather", Georgia, "Times New Roman", serif !important;
    font-size: 14px !important;
    line-height: 1.6 !important;
    font-weight: 300 !important;
  }

  .wrapper,
  .sidebar,
  section,
  footer,
  .sidebar-footer,
  .link-wrapper,
  .link-wrapper-mobile,
  ul.link,
  ul.link li,
  ul.link a {
    font-family: "Merriweather", Georgia, "Times New Roman", serif !important;
    font-size: 14px !important;
    font-weight: 300 !important;
  }

  h1 {
    font-family: "Source Sans 3", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif !important;
    font-size: 26px !important;
    line-height: 1.15 !important;
    font-weight: 800 !important;
    letter-spacing: -0.02em !important;
  }

  h2 {
    font-family: "Source Sans 3", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif !important;
    font-size: 21px !important;
    line-height: 1.2 !important;
    font-weight: 500 !important;
    letter-spacing: -0.01em !important;
  }

  h3,
  h4,
  h5,
  h6 {
    font-family: "Source Sans 3", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif !important;
    font-size: 17px !important;
    line-height: 1.25 !important;
    font-weight: 700 !important;
    letter-spacing: -0.005em !important;
  }

  strong,
  b {
    font-weight: 700 !important;
  }

  #theme-toggle-button {
    font-family: "Merriweather", Georgia, "Times New Roman", serif !important;
    font-size: 14px !important;
    font-weight: 300 !important;
  }

  .sidebar h1 {
    font-weight: 500 !important;
  }
</style>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free/css/all.min.css">

<!-- Setup Google Analytics -->

  gtag('config', 'G-XFBVV0NE03');
</script>

<!-- You can set your favicon here -->
{% if site.favicon %}
  <link rel="shortcut icon" type="image/x-icon" href="{{ '/img/favicon.png' | relative_url }}">
{% endif %}
